services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: canopy
      POSTGRES_PASSWORD: canopy
      POSTGRES_DB: canopy
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U canopy -d canopy']
      interval: 2s
      timeout: 2s
      retries: 20
    volumes:
      - canopy-postgres:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 2s
      timeout: 2s
      retries: 20
    volumes:
      - canopy-redis:/data

volumes:
  canopy-postgres:
  canopy-redis:
