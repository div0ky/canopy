services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: doxa
      POSTGRES_PASSWORD: doxa
      POSTGRES_DB: doxa
    ports:
      - '54329:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U doxa']
      interval: 2s
      timeout: 2s
      retries: 20
    volumes:
      - doxa-postgres:/var/lib/postgresql/data

volumes:
  doxa-postgres:
