packages:
  - apps/*
  - packages/*
  - examples/*
autoInstallPeers: true
preferWorkspacePackages: true
strictPeerDependencies: true
allowBuilds:
  cpu-features: false
  esbuild: true
  protobufjs: false
  sharp: true
  ssh2: false
  unrs-resolver: true
minimumReleaseAgeExclude:
  - hono@4.12.29
  - pg-boss@12.26.0
overrides:
  '@esbuild-kit/core-utils>esbuild': 0.25.12
  '@hono/node-server': 2.0.11
  fast-uri: 3.1.4
  postcss: 8.5.16
  sharp: 0.35.3
  svgo: 4.0.2
