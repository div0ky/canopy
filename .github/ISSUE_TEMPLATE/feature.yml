name: Feature proposal
description: Propose a developer-facing capability or improvement
title: '[Proposal]: '
labels: [proposal, needs-discussion]
body:
  - type: textarea
    id: problem
    attributes:
      label: Developer problem
      description:
        Describe the application-development problem without prescribing an implementation.
    validations:
      required: true
  - type: textarea
    id: experience
    attributes:
      label: Desired Canopy experience
      description: Show the application code or Arbor workflow you want developers to use.
    validations:
      required: true
  - type: textarea
    id: invariants
    attributes:
      label: Safety and compatibility constraints
      description:
        Note security, durability, observability, migration, or existing-contract implications.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing decisions, issues, and discussions.
          required: true
